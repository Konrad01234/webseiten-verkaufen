# =====================================================================
# EasyJobs — Netlify deployment configuration
# ---------------------------------------------------------------------
# Read automatically by Netlify when this repository is connected to a
# Netlify site. No build step is needed (this is a static site), so
# `publish = "."` simply publishes the repo root.
# =====================================================================

[build]
  publish = "."
  command = ""

# ---------------------------------------------------------------------
# Entry point rewrite
# ---------------------------------------------------------------------
# The actual homepage lives in easyjobs-complete.html (kept under that
# name so it's easy to find in the repo). Netlify's default is to serve
# /index.html for "/", so we add a rewrite that makes Netlify serve
# easyjobs-complete.html instead. status = 200 keeps the URL at "/"
# (rewrite), as opposed to 301/302 which would be a visible redirect.
# ---------------------------------------------------------------------
[[redirects]]
  from = "/"
  to = "/easyjobs-complete.html"
  status = 200

# ---------------------------------------------------------------------
# Real HTTP security headers
# ---------------------------------------------------------------------
# These are stronger than the <meta http-equiv> tags in index.html
# because some browsers ignore meta-equivalents (e.g. X-Frame-Options).
# ---------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Force HTTPS for two years and tell browsers to preload it.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Prevent MIME-type sniffing.
    X-Content-Type-Options = "nosniff"
    # Block clickjacking by refusing to be embedded in any iframe.
    X-Frame-Options = "DENY"
    # Trim referrer info sent to other origins.
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable powerful browser features we don't need.
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # Hide the cross-origin opener.
    Cross-Origin-Opener-Policy = "same-origin"
    # Mirror the meta CSP so it's also a real HTTP header. Inline
    # script/style is required for the existing onclick handlers; the
    # Supabase + jsdelivr origins are explicitly whitelisted.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'"

# Long-cache for static asset files (we use ?v= query strings for cache-busting)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Never cache the HTML entry point so users always get the newest deploy.
[[headers]]
  for = "/easyjobs-complete.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
