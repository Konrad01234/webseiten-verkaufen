name: Deploy Davids site to GitHub Pages

# Hinweis: Vor dem ersten Lauf muss GitHub Pages einmalig aktiviert werden:
# Repo Settings -> Pages -> "Build and deployment" -> Source: "GitHub Actions".
# Danach diesen Workflow manuell starten (Actions -> diesen Workflow -> "Run workflow").

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "sites/davids"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
